name: release

# Release yaratilganda server (relay) va worker binary'larini bir nechta platforma
# uchun build qilib, release assets'ga yuklaydi.
on:
  release:
    types: [created]

permissions:
  contents: write # release assets'ga yuklash uchun

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          suffix="${GOOS}-${GOARCH}"
          ldflags="-s -w -X main.version=${GITHUB_REF_NAME}"

          # Server (relay)
          go build -trimpath -ldflags "$ldflags" -o "relay-${suffix}${ext}" .
          # Worker
          go build -trimpath -ldflags "$ldflags" -o "relay-worker-${suffix}${ext}" ./cmd/worker

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          suffix="${{ matrix.goos }}-${{ matrix.goarch }}"
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          gh release upload "${GITHUB_REF_NAME}" \
            "relay-${suffix}${ext}" \
            "relay-worker-${suffix}${ext}" \
            --clobber
